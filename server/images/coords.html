<!DOCTYPE html>
<html>
<head>
    <title>Visor de Coordenadas Preciso</title>
    <style>
        body { background: #222; color: white; font-family: sans-serif; text-align: center; }
        #canvas-container { position: relative; display: inline-block; border: 2px solid #555; }
        img { display: block; cursor: crosshair; }
        #info { margin-top: 10px; font-size: 20px; font-weight: bold; color: #00ff00; }
    </style>
</head>
<body>
    <p>Haz clic en la imagen para obtener coordenadas fijas</p>
    <div id="canvas-container">
        <img src="eco-campus-f4-nodes.png" id="miImagen">
    </div>
    <div id="info">Coordenadas: - , -</div>

    <script>
        const img = document.getElementById('miImagen');
        const info = document.getElementById('info');

        img.addEventListener('click', function(e) {
            // Esto obtiene la posición relativa al tamaño visual de la imagen
            const rect = img.getBoundingClientRect();
            
            // Calculamos el factor de escala en caso de que el navegador la esté estirando
            const escalaX = img.naturalWidth / rect.width;
            const escalaY = img.naturalHeight / rect.height;

            // Coordenadas reales del píxel en el archivo original
            const x = Math.round((e.clientX - rect.left) * escalaX);
            const y = Math.round((e.clientY - rect.top) * escalaY);

            info.innerText = `X: ${x}, Y: ${y} (Píxeles reales)`;
            console.log(`Click en: ${x}, ${y}`);
        });
    </script>
</body>
</html>
